# ============================================================
#  tmux configuration — modernized
# ============================================================

# --- Shell -------------------------------------------------
# tmux起動時のシェルをzshにする
set-option -g default-shell /bin/zsh

# --- Colors / TrueColor -----------------------------------
# 端末をtmux-256colorに（screen-256colorより高機能）
set-option -g default-terminal "tmux-256color"
# TrueColor(24bit)を有効化 — モダンな配色テーマが正しく出る
set-option -ga terminal-overrides ",*256col*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# --- General behaviour ------------------------------------
# ESCの遅延をなくす（vim/neovimの体感が劇的に良くなる）
set-option -sg escape-time 10
# フォーカスイベントを端末→tmux→vimへ伝搬
set-option -g focus-events on
# スクロールバックの履歴を10万行に
set-option -g history-limit 100000
# ウィンドウ/ペイン番号を1始まりに（キーボードの並びと一致）
set-option -g base-index 1
set-window-option -g pane-base-index 1
# ウィンドウを閉じたら番号を詰める
set-option -g renumber-windows on
# アクティビティを他ウィンドウで監視
set-window-option -g monitor-activity on
set-option -g visual-activity off

# --- Prefix -----------------------------------------------
# prefixキーをC-qに変更
set -g prefix C-q
unbind C-b
# C-q C-q で内側のtmux/プログラムへC-qを送る
bind C-q send-prefix

# --- Reload ------------------------------------------------
# prefix + r で設定をリロード（メッセージ付き）
bind r source-file ~/.tmux.conf \; display-message " Reloaded ~/.tmux.conf"

# --- Splits ------------------------------------------------
# | で左右分割 / - で上下分割（カレントパスを引き継ぐ）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# 新規ウィンドウもカレントパスで開く
bind c new-window -c "#{pane_current_path}"

# --- Pane navigation (Vim風 hjkl) -------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Pane resize (繰り返し可: prefix押し直し不要) ---------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window navigation -------------------------------------
# prefix + Tab で直前のウィンドウへ
bind Tab last-window

# --- Status bar position ----------------------------------
# ステータスバーをトップに配置
set-option -g status-position top
set-option -g status-interval 5
set-option -g status-justify centre

# --- Status bar theme (minimal / modern) ------------------
# ベース配色（背景なし＝端末の背景に溶け込むモダンな見た目）
set-option -g status-style "bg=default,fg=colour245"

set-option -g status-left-length 90
set-option -g status-right-length 90

# 左: セッション名（アクセントカラーの丸タグ）
set-option -g status-left "#[fg=colour117,bold] #S #[default] "

# 右: CPU負荷風の区切り + 日付/時刻
set-option -g status-right "#[fg=colour245]#H #[fg=colour240]│#[fg=colour250] %Y-%m-%d #[fg=colour240]│#[fg=colour117,bold] %H:%M "

# ウィンドウ（非アクティブ / アクティブ）
set-window-option -g window-status-format "#[fg=colour244] #I #W "
set-window-option -g window-status-current-format "#[fg=colour117,bold] #I #W "
set-window-option -g window-status-activity-style "fg=colour215"

# --- Pane borders -----------------------------------------
# アクティブペインの枠を強調
set-option -g pane-border-style "fg=colour238"
set-option -g pane-active-border-style "fg=colour117"
# ペイン番号表示時の色
set-option -g display-panes-active-colour colour117
set-option -g display-panes-colour colour238

# --- Messages ----------------------------------------------
set-option -g message-style "bg=colour117,fg=colour235,bold"

# --- Mouse -------------------------------------------------
# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# --- Copy mode (Vi keys) ----------------------------------
# コピーモードをvi風に
set-window-option -g mode-keys vi
# v で選択開始、y でヤンク（pbcopy経由でmacOSクリップボードへ）
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# --- Clipboard ---------------------------------------------
# OSC52/システムクリップボード連携
set -g set-clipboard on
set -s copy-command 'pbcopy'

# マウスドラッグ選択後にpbcopyへ送る
bind-key -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
