# Use zsh as the default shell on tmux startup
set-option -g default-shell /bin/zsh

# Enable 256-color support
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# Remap the prefix key to C-q
set -g prefix C-q

# Unbind the default C-b prefix
unbind C-b

# Place the status bar at the top
set-option -g status-position top

# Max length of the left/right status segments
set-option -g status-left-length 90
set-option -g status-right-length 90

# #P => pane index; shown on the far left
set-option -g status-left '#H:[#P]'

# Wi-Fi status, battery level, current time; shown on the far right
set-option -g status-right "#(ifconfig en0 | grep -q 'status: active' && echo 📶 || echo ❌) #(pmset -g batt | awk 'NR==2 {gsub(\";\",\"\"); print $3}') [%Y-%m-%d(%a) %H:%M]"

# Redraw the status bar every second
set-option -g status-interval 1

# Center the window list in the status bar
set-option -g status-justify centre

# Use nano as the default editor (propagated to new panes)
set-environment -g EDITOR nano
set-environment -g VISUAL nano

# Show pane titles on the pane border (used by the layout scripts)
set-option -g pane-border-status top
set-option -g pane-border-format " #P #T "

# Status bar background color
set-option -g status-bg "colour238"

# Status bar foreground (text) color
set-option -g status-fg "colour255"

# prefix + Enter opens a new window with the Claude Code 3-pane layout
# (prefix + c keeps its default behavior: a blank window)
bind Enter run-shell '~/.tmux-claude-window.sh "#{pane_current_path}"'

# Split the pane left/right with |
bind | split-window -h

# Split the pane top/bottom with -
bind - split-window -v

# Enable mouse support
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"


# copy on
set -g set-clipboard on
set -s copy-command 'pbcopy'

# Send the mouse-drag selection to pbcopy on release
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'
